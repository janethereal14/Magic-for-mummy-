<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Paras</title>
    <style>
        /* General Layout */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: #FFD700; /* Gold/Yellow */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 200vh; /* Ensures there is room to scroll */
        }

        /* Falling Hearts Container */
        #heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: yellow;
            font-size: 20px;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0; /* Fades as it falls */
            }
        }

        /* Content Styling */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #typewriter {
            font-size: 3rem;
            font-weight: bold;
            border-right: 3px solid yellow;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        .name-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .name-section.visible {
            opacity: 1;
        }

        /* Audio Control */
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: yellow;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn">🎵 Play</button>

    <div class="content">
        <div class="hero-section">
            <h1 id="typewriter"></h1>
        </div>

        <div class="name-section" id="paras-name">
            <h1>PARAS</h1>
        </div>
    </div>

    <script>
        // 1. Typewriter Effect
        const text = "A special message for...";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            } else {
                document.getElementById("typewriter").style.borderRight = "none";
            }
        }

        // 2. Falling Hearts
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s"; 
            
            document.getElementById("heart-container").appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);

        // 3. Scroll Reveal for "Paras"
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.5 });

        observer.observe(document.getElementById('paras-name'));

        // 4. Music Logic 
        // Note: Browsers block auto-playing audio until the user interacts.
        const music = document.getElementById("bg-music");
        const btn = document.getElementById("music-btn");

        btn.addEventListener("click", () => {
            if (music.paused) {
                music.play();
                btn.innerText = "⏸ Pause";
            } else {
                music.pause();
                btn.innerText = "🎵 Play";
            }
        });

        window.onload = typeWriter;
    </script>
</body>
  </html>
